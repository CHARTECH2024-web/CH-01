<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHARTECH Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-black-gold">
    <!-- Écran d'authentification -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h2>CHARTECH</h2>
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Connexion</button>
                <button class="auth-tab" data-tab="register">Inscription</button>
            </div>
            <div id="loginForm" class="auth-form active">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <button onclick="login()">Se connecter</button>
            </div>
            <div id="registerForm" class="auth-form">
                <input type="text" id="registerName" placeholder="Pseudo" required>
                <input type="email" id="registerEmail" placeholder="Email" required>
                <input type="file" id="registerPhoto" accept="image/*">
                <button onclick="register()">S'inscrire</button>
            </div>
        </div>
    </div>

    <!-- Application principale -->
    <div id="mainApp" class="main-app hidden">
        <div class="sidebar">
            <div class="profile">
                <img id="profilePic" src="default-avatar.png" alt="Avatar">
                <span id="profileName"></span>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn active" data-section="chats">💬 Chats</button>
                <button class="nav-btn" data-section="groups">👥 Groupes</button>
                <button class="nav-btn" data-section="ia">🤖 IA</button>
                <button class="nav-btn" data-section="settings">⚙️ Paramètres</button>
            </nav>
        </div>
        <div class="main-content">
            <!-- Section Chats -->
            <div id="chatsSection" class="section active">
                <div class="section-header">
                    <h3>Conversations</h3>
                    <button onclick="showNewChatModal()">➕</button>
                </div>
                <div id="chatsList" class="items-list"></div>
                <div id="chatArea" class="chat-area hidden">
                    <div class="chat-header">
                        <span id="currentChatName"></span>
                        <button onclick="closeChat()">✕</button>
                    </div>
                    <div id="messages" class="messages"></div>
                    <div class="message-input">
                        <input type="text" id="messageText" placeholder="Écrire un message...">
                        <button onclick="sendMessage()">Envoyer</button>
                    </div>
                </div>
            </div>

            <!-- Section Groupes -->
            <div id="groupsSection" class="section">
                <div class="section-header">
                    <h3>Groupes</h3>
                    <button onclick="showNewGroupModal()">➕</button>
                </div>
                <div id="groupsList" class="items-list"></div>
            </div>

            <!-- Section IA -->
            <div id="iaSection" class="section">
                <div class="section-header">
                    <h3>Assistant IA</h3>
                </div>
                <div id="iaMessages" class="messages"></div>
                <div class="message-input">
                    <input type="text" id="iaInput" placeholder="Pose ta question...">
                    <button onclick="sendIAMessage()">Envoyer</button>
                </div>
            </div>

            <!-- Section Paramètres -->
            <div id="settingsSection" class="section">
                <h3>Paramètres</h3>
                <div class="settings-group">
                    <label>Thème :</label>
                    <div class="theme-buttons">
                        <button onclick="setTheme('black-gold')">Noir Or</button>
                        <button onclick="setTheme('blue-neon')">Bleu Néon</button>
                        <button onclick="setTheme('red-light')">Rouge Clair</button>
                        <button onclick="setTheme('green-very')">Vert</button>
                        <button onclick="setTheme('light-blue')">Clair Bleu</button>
                    </div>
                </div>
                <div class="settings-group">
                    <label>Langue :</label>
                    <div class="lang-buttons">
                        <button onclick="setLanguage('fr')">Français</button>
                        <button onclick="setLanguage('en')">English</button>
                    </div>
                </div>
                <button onclick="logout()" class="logout-btn">Déconnexion</button>
            </div>
        </div>
    </div>

    <!-- Modales -->
    <div id="newChatModal" class="modal hidden">
        <div class="modal-content">
            <h3>Nouvelle conversation</h3>
            <input type="email" id="newChatEmail" placeholder="Email du destinataire">
            <button onclick="startPrivateChat()">Démarrer</button>
            <button onclick="closeModal()">Annuler</button>
        </div>
    </div>

    <div id="newGroupModal" class="modal hidden">
        <div class="modal-content">
            <h3>Nouveau groupe</h3>
            <input type="text" id="newGroupName" placeholder="Nom du groupe">
            <textarea id="newGroupMembers" placeholder="Emails des membres (séparés par des virgules)"></textarea>
            <button onclick="createGroup()">Créer</button>
            <button onclick="closeModal()">Annuler</button>
        </div>
    </div>

    <!-- Scripts Firebase (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
